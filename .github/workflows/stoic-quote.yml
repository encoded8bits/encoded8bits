name: Daily Stoic Quote

on:
  schedule:
    - cron: '0 0 * * *' # Se ejecuta a la medianoche UTC
  workflow_dispatch:      # Permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch and Inject Stoic Quote
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            try {
              // 1. Obtener la frase de la API
              const response = await fetch('https://stoic-quotes.com/api/quote');
              const data = await response.json();
              
              // 2. Formatear la frase con Markdown de forma elegante
              // Usamos negritas para el autor y itálicas para la cita
              const fullQuote = `*"${data.text}"*\n\n— **${data.author}**`;
              
              // 3. Leer el README.md actual
              let readme = fs.readFileSync('README.md', 'utf8');
              
              // 4. Definir los tags de anclaje
              const startTag = '';
              const endTag = '';
              
              // Regex para encontrar el contenido entre los tags y reemplazarlo
              const regex = new RegExp(`${startTag}[\\s\\S]*?${endTag}`, 'g');
              const newSection = `${startTag}\n\n${fullQuote}\n\n${endTag}`;
              
              if (readme.includes(startTag)) {
                const updatedReadme = readme.replace(regex, newSection);
                fs.writeFileSync('README.md', updatedReadme);
                console.log('✅ README actualizado con éxito.');
              } else {
                console.error('❌ No se encontraron los tags en el README.');
                process.exit(1);
              }
            } catch (error) {
              console.error('❌ Error en el script:', error);
              process.exit(1);
            }

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update daily stoic quote (via node engine)" || exit 0
          git push