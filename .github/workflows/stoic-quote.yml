name: Daily Stoic Quote

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and inject Stoic quote
        run: |
          # -L follows 307 to www; plain curl only gets "Redirecting..." (not JSON), which breaks jq
          RESPONSE=$(curl -fsSL https://stoic-quotes.com/api/quote)
          TEXT=$(echo "$RESPONSE" | jq -r '.text')
          AUTHOR=$(echo "$RESPONSE" | jq -r '.author')
          QUOTE_BLOCK="> \"$TEXT\" — $AUTHOR"
          sed -i '/<!-- STOIC_QUOTE_START -->/,/<!-- STOIC_QUOTE_END -->/{/<!-- STOIC_QUOTE_START -->/!{/<!-- STOIC_QUOTE_END -->/!d}}' README.md
          sed -i "s|<!-- STOIC_QUOTE_START -->|<!-- STOIC_QUOTE_START -->\n$QUOTE_BLOCK|" README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update daily stoic quote"
          git push
